<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Magician Admin | Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            background: linear-gradient(135deg, #090e1a 0%, #172554 100%);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="glass w-full max-w-2xl mb-10">
        <h1 class="text-2xl font-bold mb-6 text-center">PANEL DE CONTROL</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <label class="text-[10px] font-bold uppercase text-slate-500">ID de la Sala</label>
                <input type="text" id="salaId" placeholder="ej. mago_01" 
                       class="w-full mt-2 bg-white/5 border border-white/10 rounded-xl p-3 focus:border-blue-500 outline-none">
                
                <label class="text-[10px] font-bold uppercase text-slate-500 mt-6 block">Proyectos</label>
                <div id="proyectosDisponibles" class="space-y-2 mt-2 max-h-40 overflow-y-auto"></div>
            </div>
            
            <div class="flex flex-col justify-end">
                <button onclick="guardarSala()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-semibold transition">
                    Guardar / Actualizar Sala
                </button>
            </div>
        </div>
    </div>

    <div class="glass w-full max-w-2xl">
        <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-6">Salas Activas</h2>
        <div id="listaSalas" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbPEsgusK335aOjVj8jIJk7VLHqerJg9c",
            authDomain: "gestor-de-links-magia.firebaseapp.com",
            projectId: "gestor-de-links-magia",
            storageBucket: "gestor-de-links-magia.firebasestorage.app",
            messagingSenderId: "879159665131",
            appId: "1:879159665131:web:55c98610c39a1a04f479ae"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // Cargar Proyectos al iniciar
        async function cargarProyectos() {
            const snap = await getDocs(collection(db, "proyectos"));
            const div = document.getElementById('proyectosDisponibles');
            snap.forEach(d => {
                div.innerHTML += `
                    <label class="flex items-center text-sm">
                        <input type="checkbox" value="${d.id}" class="mr-3 accent-blue-500"> ${d.data().nombre}
                    </label>`;
            });
        }

        // Listar Salas existentes

        // Listar Salas existentes con su Link de Acceso
async function listarSalas() {
    const snap = await getDocs(collection(db, "salas"));
    const lista = document.getElementById('listaSalas');
    lista.innerHTML = '';
    
    // URL Base
    const urlBase = "https://jester52.github.io/Clinks/?sala=";

    snap.forEach(d => {
        const linkCompleto = urlBase + d.id;
        lista.innerHTML += `
            <div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-3">
                <div class="flex justify-between items-center">
                    <span class="font-mono text-blue-400 font-bold">${d.id}</span>
                    <div class="space-x-2">
                        <button onclick="editarSala('${d.id}')" class="text-xs text-yellow-500 hover:text-yellow-400">Editar</button>
                        <button onclick="borrarSala('${d.id}')" class="text-xs text-red-500 hover:text-red-400">Eliminar</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" readonly value="${linkCompleto}" 
                           class="w-full bg-black/30 text-[10px] p-2 rounded border border-white/5 text-slate-400 font-mono">
                    <button onclick="copiarLink('${linkCompleto}')" 
                            class="px-3 py-1 bg-blue-600/20 text-blue-400 text-[10px] rounded hover:bg-blue-600/40">
                        Copiar
                    </button>
                </div>
            </div>`;
    });
}

// Función para copiar al portapapeles
window.copiarLink = (link) => {
    navigator.clipboard.writeText(link);
    alert("¡Link copiado al portapapeles!");
};

        window.guardarSala = async () => {
            const id = document.getElementById('salaId').value.trim();
            const checked = Array.from(document.querySelectorAll('#proyectosDisponibles input:checked')).map(i => i.value);
            if(!id) return alert("Escribe un ID");
            await setDoc(doc(db, "salas", id), { proyectos_activos: checked });
            alert("¡Guardado!");
            listarSalas();
        };

        window.editarSala = async (id) => {
            const snap = await getDoc(doc(db, "salas", id));
            document.getElementById('salaId').value = id;
            const permitidos = snap.data().proyectos_activos;
            document.querySelectorAll('#proyectosDisponibles input').forEach(cb => {
                cb.checked = permitidos.includes(cb.value);
            });
        };

        window.borrarSala = async (id) => {
            if(confirm("¿Eliminar sala " + id + "?")) {
                await deleteDoc(doc(db, "salas", id));
                listarSalas();
            }
        };

        cargarProyectos();
        listarSalas();
    </script>
</body>
</html>
